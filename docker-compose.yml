services:

  # ── Contenedor A: Trainer ─────────────────────────────────
  # Re-entrena modelos semanalmente (domingos 02:00 UTC)
  # Para forzar: docker compose run --rm -e RUN_MODE=once regime-trainer
  regime-trainer:
    build:
      context: .
      dockerfile: Dockerfile.trainer
    container_name: regime-trainer
    env_file: .env
    environment:
      - RUN_MODE=cron
    volumes:
      - ./models:/app/models    # carpeta local — compartida con el bot
      - ./logs:/app/logs
    restart: unless-stopped

  # ── Contenedor B: Bot de Inferencia 24/7 ──────────────────
  # Carga los .pkl desde ./models/ (ya entrenados)
  # Recarga automáticamente si el trainer actualiza un .pkl
  regime-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: regime-bot
    env_file: .env
    volumes:
      - ./models:/app/models    # carpeta local — lee los .pkl
      - ./logs:/app/logs
    restart: unless-stopped

volumes: {}
